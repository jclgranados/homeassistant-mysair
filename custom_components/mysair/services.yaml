stop_installation:
  name: Detener instalación
  description: >-
    Detiene una instalación MySair completa (todas sus zonas de golpe),
    usando el comando "stop" del backend. Distinto de apagar cada zona por
    separado con el switch o el climate.
  fields:
    installation_ref:
      name: Referencia de instalación
      description: >-
        Referencia (ctl) de la instalación a detener, tal como aparece entre
        paréntesis en el nombre del dispositivo de sus entidades (por
        ejemplo "MYS94B97E0C9177FB6").
      required: true
      example: "MYS94B97E0C9177FB6"
      selector:
        text:
